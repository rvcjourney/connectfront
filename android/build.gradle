buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 25
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// AndroidUSBCamera: JitPack often publishes POMs without AARs; Liferay mirrors binaries. Force these groups off JitPack.
allprojects {
    repositories {
        exclusiveContent {
            forRepository {
                maven { url "https://repository.liferay.com/nexus/content/repositories/public/" }
            }
            filter {
                includeGroup "com.github.jiangdongguo.AndroidUSBCamera"
                includeGroup "com.github.jiangdongguo"
            }
        }
    }
}
